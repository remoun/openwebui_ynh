#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "openwebui"
name = "Open WebUI"
description.en = "User-friendly AI chat interface supporting Ollama and OpenAI-compatible APIs"
description.fr = "Interface de chat IA conviviale supportant Ollama et les API compatibles OpenAI"

version = "0.6.5~ynh1"

maintainers = []

[upstream]
license = "MIT"
website = "https://openwebui.com"
admindoc = "https://docs.openwebui.com"
userdoc = "https://docs.openwebui.com"
code = "https://github.com/open-webui/open-webui"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
ldap = true
sso = true
disk = "1000M"
ram.build = "1500M"
ram.runtime = "256M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/"

    [install.admin]
    type = "user"

    [install.init_main_permission]
    type = "group"
    default = "visitors"
    help.en = "If set to 'visitors', anyone can access the login page. If set to a specific group, only those YunoHost users can access the app via SSO."
    help.fr = "Si défini sur 'visitors', tout le monde peut accéder à la page de connexion. Si défini sur un groupe spécifique, seuls ces utilisateurs YunoHost peuvent accéder à l'application via SSO."

    [install.llm_backend]
    ask.en = "LLM backend to use"
    ask.fr = "Backend LLM à utiliser"
    help.en = "Choose which AI provider(s) to configure now. You can always add more later in Open WebUI's settings."
    help.fr = "Choisissez quel(s) fournisseur(s) IA configurer maintenant. Vous pouvez toujours en ajouter d'autres plus tard dans les paramètres d'Open WebUI."
    type = "select"
    choices = ["ollama", "openai", "both", "none"]
    default = "none"

    [install.ollama_connection]
    ask.en = "Ollama connection mode"
    ask.fr = "Mode de connexion Ollama"
    help.en = "Use 'local' if Ollama runs on this server (localhost:11434). Use 'remote' to specify a custom URL."
    help.fr = "Utilisez 'local' si Ollama fonctionne sur ce serveur (localhost:11434). Utilisez 'remote' pour spécifier une URL personnalisée."
    type = "select"
    choices = ["local", "remote"]
    default = "local"
    visible = "llm_backend == 'ollama' || llm_backend == 'both'"

    [install.ollama_url]
    ask.en = "Ollama API URL"
    ask.fr = "URL de l'API Ollama"
    help.en = "Full URL to the Ollama API."
    help.fr = "URL complète de l'API Ollama."
    type = "string"
    default = "http://localhost:11434"
    visible = "(llm_backend == 'ollama' || llm_backend == 'both') && ollama_connection == 'remote'"

    [install.openai_api_key]
    ask.en = "OpenAI-compatible API key"
    ask.fr = "Clé API compatible OpenAI"
    help.en = "API key for OpenAI, Anthropic (via proxy), or any OpenAI-compatible provider."
    help.fr = "Clé API pour OpenAI, Anthropic (via proxy), ou tout fournisseur compatible OpenAI."
    type = "string"
    default = ""
    optional = true
    visible = "llm_backend == 'openai' || llm_backend == 'both'"

    [install.openai_api_base_url]
    ask.en = "OpenAI-compatible API base URL"
    ask.fr = "URL de base de l'API compatible OpenAI"
    help.en = "For OpenAI, use the default. For other providers (LiteLLM, etc.), enter their API URL."
    help.fr = "Pour OpenAI, utilisez la valeur par défaut. Pour d'autres fournisseurs (LiteLLM, etc.), entrez leur URL API."
    type = "string"
    default = "https://api.openai.com/v1"
    visible = "llm_backend == 'openai' || llm_backend == 'both'"

[resources]
    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "python3, python3-venv, python3-pip, python3-dev, build-essential, libffi-dev, postgresql"

    [resources.database]
    type = "postgresql"
